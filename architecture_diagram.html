<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>NanoMech Architecture</title>
<style>
  body { margin: 0; padding: 20px; background: #0e0e0e; font-family: 'Segoe UI', Arial, sans-serif; }
</style>
</head>
<body>
<svg width="800" height="680" viewBox="0 0 800 680" xmlns="http://www.w3.org/2000/svg">

  <!-- Background -->
  <rect width="800" height="680" fill="#0e0e0e" rx="16"/>

  <!-- Title -->
  <text x="400" y="36" text-anchor="middle" font-size="18" font-weight="700" fill="#00FFC2" font-family="Segoe UI, Arial">NanoMech — System Architecture</text>
  <text x="400" y="54" text-anchor="middle" font-size="12" fill="#888" font-family="Segoe UI, Arial">UI Navigator | Gemini Live Agent Challenge 2026</text>

  <!-- ═══════════════════════════════════ -->
  <!-- LAYER 1: User Screen               -->
  <!-- ═══════════════════════════════════ -->
  <rect x="60" y="70" width="680" height="72" rx="10" fill="#0D2B1E" stroke="#00FFC2" stroke-width="1.5"/>
  <text x="400" y="100" text-anchor="middle" font-size="14" font-weight="700" fill="#00FFC2" font-family="Segoe UI, Arial">USER'S TRADING SCREEN</text>
  <text x="400" y="122" text-anchor="middle" font-size="12" fill="#88c8a8" font-family="Segoe UI, Arial">TradingView · Binance · Bybit · Any chart platform</text>

  <!-- Arrow down -->
  <line x1="400" y1="142" x2="400" y2="170" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="418" y="160" font-size="11" fill="#666" font-family="Segoe UI, Arial">mss screenshot</text>

  <!-- ═══════════════════════════════════ -->
  <!-- LAYER 2: NanoMech App              -->
  <!-- ═══════════════════════════════════ -->
  <rect x="60" y="172" width="680" height="210" rx="10" fill="#13102A" stroke="#534AB7" stroke-width="1.5"/>
  <text x="400" y="197" text-anchor="middle" font-size="14" font-weight="700" fill="#AFA9EC" font-family="Segoe UI, Arial">NANOMECH DESKTOP APP  (Python)</text>

  <!-- Box: Screen Capture -->
  <rect x="82" y="210" width="160" height="60" rx="8" fill="#1a1a2e" stroke="#444" stroke-width="1"/>
  <text x="162" y="235" text-anchor="middle" font-size="13" font-weight="600" fill="#E0E0E0" font-family="Segoe UI, Arial">Screen Capture</text>
  <text x="162" y="255" text-anchor="middle" font-size="11" fill="#888" font-family="Segoe UI, Arial">mss + Pillow</text>

  <!-- Arrow -->
  <line x1="242" y1="240" x2="298" y2="240" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Box: Google GenAI SDK -->
  <rect x="300" y="210" width="200" height="60" rx="8" fill="#0a1628" stroke="#185FA5" stroke-width="1.5"/>
  <text x="400" y="235" text-anchor="middle" font-size="13" font-weight="600" fill="#85B7EB" font-family="Segoe UI, Arial">Google GenAI SDK</text>
  <text x="400" y="255" text-anchor="middle" font-size="11" fill="#558" font-family="Segoe UI, Arial">image + structured prompt</text>

  <!-- Arrow -->
  <line x1="500" y1="240" x2="556" y2="240" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Box: Response Parser -->
  <rect x="558" y="210" width="160" height="60" rx="8" fill="#1a1a2e" stroke="#444" stroke-width="1"/>
  <text x="638" y="235" text-anchor="middle" font-size="13" font-weight="600" fill="#E0E0E0" font-family="Segoe UI, Arial">Response Parser</text>
  <text x="638" y="255" text-anchor="middle" font-size="11" fill="#888" font-family="Segoe UI, Arial">regex → prices</text>

  <!-- Arrows down from parser to both overlays -->
  <line x1="550" y1="270" x2="260" y2="300" stroke="#444" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arr)"/>
  <line x1="638" y1="270" x2="638" y2="298" stroke="#444" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arr)"/>

  <!-- Box: Overlay 1 -->
  <rect x="82" y="300" width="300" height="68" rx="8" fill="#1a0d10" stroke="#FF3366" stroke-width="1"/>
  <text x="232" y="322" text-anchor="middle" font-size="13" font-weight="600" fill="#FF3366" font-family="Segoe UI, Arial">Overlay 1 — Market Analysis</text>
  <text x="232" y="342" text-anchor="middle" font-size="11" fill="#cc6680" font-family="Segoe UI, Arial">Trend  ·  Liquidity  ·  Momentum</text>
  <text x="232" y="360" text-anchor="middle" font-size="10" fill="#885566" font-family="Segoe UI, Arial">Typewriter display  ·  Auto-refresh</text>

  <!-- Box: Overlay 2 -->
  <rect x="418" y="300" width="300" height="68" rx="8" fill="#1a150a" stroke="#FF9800" stroke-width="1"/>
  <text x="568" y="322" text-anchor="middle" font-size="13" font-weight="600" fill="#FF9800" font-family="Segoe UI, Arial">Overlay 2 — Trade Setup</text>
  <text x="568" y="342" text-anchor="middle" font-size="11" fill="#cc8833" font-family="Segoe UI, Arial">Entry · Target · Stop  +  CALC</text>
  <text x="568" y="360" text-anchor="middle" font-size="10" fill="#886633" font-family="Segoe UI, Arial">Risk Amt · Size · R:R Ratio (live)</text>

  <!-- Arrow: GenAI SDK to Google Cloud -->
  <line x1="400" y1="382" x2="400" y2="420" stroke="#185FA5" stroke-width="2" marker-end="url(#arr2)"/>
  <text x="420" y="406" font-size="11" fill="#558" font-family="Segoe UI, Arial">HTTPS + image</text>

  <!-- ═══════════════════════════════════ -->
  <!-- LAYER 3: Google Cloud              -->
  <!-- ═══════════════════════════════════ -->
  <rect x="60" y="422" width="680" height="100" rx="10" fill="#031628" stroke="#378ADD" stroke-width="2"/>
  <text x="400" y="450" text-anchor="middle" font-size="14" font-weight="700" fill="#85B7EB" font-family="Segoe UI, Arial">GOOGLE CLOUD</text>
  <text x="400" y="474" text-anchor="middle" font-size="13" font-weight="600" fill="#378ADD" font-family="Segoe UI, Arial">Gemini 2.5 Flash  —  Multimodal Vision Model</text>
  <text x="400" y="496" text-anchor="middle" font-size="11" fill="#336699" font-family="Segoe UI, Arial">Reads chart image  ·  Returns [ANALYSIS] + [TRADE] structured response</text>
  <text x="400" y="512" text-anchor="middle" font-size="11" fill="#336699" font-family="Segoe UI, Arial">Powered by Google Cloud AI Infrastructure</text>

  <!-- Response arrow back -->
  <path d="M720 422 Q760 400 720 382" fill="none" stroke="#185FA5" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr)"/>
  <text x="730" y="403" font-size="10" fill="#558" font-family="Segoe UI, Arial">JSON</text>

  <!-- ═══════════════════════════════════ -->
  <!-- LAYER 4: Bottom row               -->
  <!-- ═══════════════════════════════════ -->
  <line x1="200" y1="522" x2="200" y2="554" stroke="#444" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="600" y1="370" x2="600" y2="380" stroke="#444" stroke-width="1"/>
  <line x1="600" y1="522" x2="600" y2="554" stroke="#444" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Box: Session Logs -->
  <rect x="60" y="556" width="300" height="76" rx="8" fill="#111" stroke="#444" stroke-width="1"/>
  <text x="210" y="580" text-anchor="middle" font-size="13" font-weight="600" fill="#aaa" font-family="Segoe UI, Arial">Session Logs  (local)</text>
  <text x="210" y="600" text-anchor="middle" font-size="11" fill="#666" font-family="Segoe UI, Arial">chart screenshot  +  trade_data.txt</text>
  <text x="210" y="618" text-anchor="middle" font-size="10" fill="#555" font-family="Segoe UI, Arial">per scan  ·  auto-cleaned after 7 days</text>

  <!-- Box: User Controls -->
  <rect x="440" y="556" width="300" height="76" rx="8" fill="#111" stroke="#444" stroke-width="1"/>
  <text x="590" y="580" text-anchor="middle" font-size="13" font-weight="600" fill="#aaa" font-family="Segoe UI, Arial">User Controls</text>
  <text x="590" y="600" text-anchor="middle" font-size="11" fill="#666" font-family="Segoe UI, Arial">Ctrl+A+I hotkey  ·  Risk % input</text>
  <text x="590" y="618" text-anchor="middle" font-size="10" fill="#555" font-family="Segoe UI, Arial">Auto mode  ·  Draggable overlays  ·  ESC to quit</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#555" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#185FA5" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

</svg>
</body>
</html>
